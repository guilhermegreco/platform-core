# Capability charts read defaults.* (subnets/VPC/cluster) — injected per the runtime.
# For the PoC the runtime shares the control-plane VPC, so these match the hub.
team-database:
  defaults:
    clusterName: plat-cp-cluster
team-cache:
  defaults:
    clusterName: plat-cp-cluster
team-pubsub:
  defaults:
    clusterName: plat-cp-cluster

# Capability identities for the spoke kro→ACK RBAC (templates/capability-rbac.yaml).
accountId: "279051970617"
kroCapabilityRole: "plat-cp-capability-kro"
ackCapabilityRole: "plat-cp-ack-capability"
