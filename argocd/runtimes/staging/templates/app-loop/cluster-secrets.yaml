{{- /*
App loop, part 1/2 — register the spoke's OWN cluster with its OWN ArgoCD capability.

Per AWS docs (Register target clusters): the managed ArgoCD capability does NOT
auto-register the local cluster, and `server` MUST be the EKS cluster ARN
(kubernetes.default.svc is unsupported). This mirrors the hub's terraform-owned
`local-cluster` Secret (platform-control-plane/terraform/poc/argocd-cluster.tf) — but
inside the spoke it is delivered declaratively by the hub via this umbrella, because a
spoke has no terraform of its own.

Two-secret split (§7 of the multicluster plan, validated live on the hub):
  - `local-cluster` (data.name=in-cluster) is the DEPLOY TARGET the apps ApplicationSet
    points at (destination.name: in-cluster).
  - `<cluster>-topology` (data.name ≠ in-cluster) carries the platform.io/* annotations
    and the `platform.io/topology: "true"` selector label; the apps ApplicationSet's
    clusters generator selects ON that label (one row → no duplicate-name collision) and
    reads the annotations to inject topology into platform-app.

Gated on runtime.clusterArn: empty on a bare `helm template`, so nothing renders unless
the hub injected the spoke identity.
*/}}
{{- if .Values.runtime.clusterArn }}
apiVersion: v1
kind: Secret
metadata:
  name: local-cluster
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: cluster
    env: {{ .Values.runtime.environment | quote }}
    app.kubernetes.io/managed-by: runtime-rgd
type: Opaque
stringData:
  name: in-cluster
  server: {{ .Values.runtime.clusterArn | quote }}
  project: default
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.runtime.clusterName }}-topology
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: cluster
    platform.io/topology: "true"
    env: {{ .Values.runtime.environment | quote }}
  annotations:
    platform.io/account-id: {{ .Values.runtime.accountId | quote }}
    platform.io/region: {{ .Values.runtime.region | quote }}
    platform.io/cluster-name: {{ .Values.runtime.clusterName | quote }}
    platform.io/environment: {{ .Values.runtime.environment | quote }}
    platform.io/ingress-domain: {{ .Values.runtime.ingress.domain | quote }}
    platform.io/ingress-scheme: {{ .Values.runtime.ingress.scheme | quote }}
    # NOTE: no platform.io/ingress-class-name — the per-namespace IngressClass is DERIVED
    # in the apps ApplicationSet as "<namespace>-alb" (matching the tenant RGD), not taken
    # from a spoke-wide annotation.
    platform.io/ingress-group-prefix: {{ .Values.runtime.ingress.groupPrefix | quote }}
type: Opaque
stringData:
  name: {{ .Values.runtime.clusterName }}-topology
  server: {{ .Values.runtime.clusterArn | quote }}
  project: default
{{- end }}
