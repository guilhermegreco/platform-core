# Capability charts read defaults.* (subnets/VPC/cluster) — injected per the runtime.
# For the PoC the runtime shares the control-plane VPC, so these match the hub.
team-database:
  defaults:
    clusterName: plat-cp-prod-cluster
    # Spoke shares the prod hub VPC (PoC). Must match the prod hub VPC, else the
    # SecurityGroup fails InvalidVpcID.NotFound against the chart's stale default vpcId.
    vpcId: "vpc-0c0cf7756830e935f"
    vpcCidr: "10.0.0.0/16"
    dbSubnetGroupName: plat-cp-prod-db-subnets
team-cache:
  defaults:
    clusterName: plat-cp-prod-cluster
    vpcId: "vpc-0c0cf7756830e935f"
    vpcCidr: "10.0.0.0/16"
    cacheSubnetGroupName: plat-cp-prod-cache-subnets
team-pubsub:
  defaults:
    clusterName: plat-cp-prod-cluster
# The tenant RGD's per-namespace IngressClassParams scheme. internet-facing so the demo
# ALB is reachable for inspection (the ALB scheme lives in IngressClassParams, not on the
# Ingress — Auto Mode ignores the annotation; see platform-app ingress template).
tenant:
  defaults:
    ingressScheme: internet-facing

# --- App loop (the runtime's OWN ArgoCD deploys platform-app locally) ---
#
# These are INJECTED by the Runtime RGD's platformLayer Application (helm.parameters)
# when the hub syncs this umbrella into a spoke — see platform-capability-eks
# runtime-rgd.yaml. On a bare `helm template` they are empty, so the app-loop
# templates (templates/app-loop/) render to nothing and only the capability RGDs
# above are deployed. `runtime.clusterArn` being non-empty is the gate that turns
# the loop on.
runtime:
  clusterName: ""
  clusterArn: ""           # EKS ARN of the spoke; the registration `server` value
  region: ""
  environment: prod
  accountId: ""
  # Ingress edge for the spoke. Feeds platform.ingress.* injection so a route.enabled
  # app gets an Ingress on its per-namespace IngressClass (created by the tenant RGD).
  # The per-namespace className is DERIVED in the appset (<namespace>-alb), so it is NOT
  # set here; domain/scheme/groupPrefix are the spoke-wide edge config.
  ingress:
    domain: "prod.runtime.platform"
    scheme: internet-facing
    groupPrefix: "runtime-prod"
