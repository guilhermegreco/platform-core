# Developer app values — INTENT ONLY. Deployed by the runtime's OWN platform-apps
# ApplicationSet (argocd/runtimes/<env>/templates/app-loop/platform-apps-appset.yaml),
# which the HUB delivers into the spoke and the SPOKE's ArgoCD runs.
#
# Platform topology (accountId/region/clusterName/platform.ingress.*) is INJECTED from
# the spoke's topology cluster Secret — do NOT set it here; any value is overridden.
#
# Deployed into a namespace named after this directory (sample-app).
#
# NOTE: route is disabled for this increment — the runtime's per-namespace IngressClass
# (tenant RGD inside the spoke) is the next slice. With route off this proves the app
# loop end-to-end (spoke ArgoCD → Deployment/Service running locally) without depending
# on ingress. Flip route.enabled once the spoke has a Tenant + IngressClass.
name: sample-app
team: demo
image: public.ecr.aws/nginx/nginx:latest
port: 8080
replicas: 2

route:
  enabled: false

# Capability bindings (all optional, default off). The spoke can expand these locally
# now that kro→ACK is granted (B1 access-entry policy); left off here so the app-loop
# demo does not provision real AWS on every sync.
database:
  enabled: false
cache:
  enabled: false
events:
  enabled: false
