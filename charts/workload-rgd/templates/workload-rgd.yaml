apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: workload.kro.run
spec:
  schema:
    apiVersion: v1alpha1
    kind: Workload
    spec:
      name: string
      namespace: string | default="default"
      team: string | default="default"

      containers:
        main:
          image: string
          command: "[]string"
          variables: "map[string]string"
          resources:
            cpu: string | default="250m"
            memory: string | default="256Mi"

      service:
        ports:
          http:
            port: integer | default=8080
            protocol: string | default="TCP"
        routes:
          public: boolean | default=false
          host: string | default=""

      # Resources are OPAQUE — the Workload RGD does not enumerate team fields.
      # Each team's RGD defines its own schema. The Workload just forwards properties.
      resources:
        database:
          type: string | default=""
          properties: "map[string]any"
        cache:
          type: string | default=""
          properties: "map[string]any"
        events:
          type: string | default=""
          properties: "map[string]any"

    status:
      replicas: ${deployment.status.availableReplicas}
      url: ${service.metadata.name}
      resources:
        database:
          host: ${database.status.endpoint}
          port: ${database.status.port}
          secret: ${database.status.secretName}
        cache:
          host: ${cache.status.endpoint}
          port: ${cache.status.port}
        events:
          topicArn: ${eventbus.status.topicArn}
          queueUrl: ${eventbus.status.queueUrl}

  resources:
    # === ServiceAccount (one per workload) ===
    - id: serviceaccount
      template:
        apiVersion: v1
        kind: ServiceAccount
        metadata:
          name: ${schema.spec.name}-sa
          namespace: ${schema.spec.namespace}
          labels:
            platform.io/team: ${schema.spec.team}
            platform.io/workload: ${schema.spec.name}

    # === Database (conditional) ===
    # Properties are passed through directly — team RGD validates them
    - id: database
      includeWhen:
        - ${schema.spec.resources.database.type != ""}
      readyWhen:
        - ${has(database.status.endpoint)}
      template:
        apiVersion: kro.run/v1alpha1
        kind: Database
        metadata:
          name: ${schema.spec.name}-db
          namespace: ${schema.spec.namespace}
          labels:
            platform.io/team: ${schema.spec.team}
        spec: '${merge(schema.spec.resources.database.properties, {"name": schema.spec.name, "namespace": schema.spec.namespace, "serviceAccount": schema.spec.name + "-sa"})}'

    # === Cache (conditional) ===
    - id: cache
      includeWhen:
        - ${schema.spec.resources.cache.type != ""}
      readyWhen:
        - ${has(cache.status.endpoint)}
      template:
        apiVersion: kro.run/v1alpha1
        kind: Cache
        metadata:
          name: ${schema.spec.name}-cache
          namespace: ${schema.spec.namespace}
          labels:
            platform.io/team: ${schema.spec.team}
        spec: '${merge(schema.spec.resources.cache.properties, {"name": schema.spec.name, "namespace": schema.spec.namespace})}'

    # === EventBus (conditional) ===
    - id: eventbus
      includeWhen:
        - ${schema.spec.resources.events.type != ""}
      readyWhen:
        - ${has(eventbus.status.topicArn)}
      template:
        apiVersion: kro.run/v1alpha1
        kind: EventBus
        metadata:
          name: ${schema.spec.name}-events
          namespace: ${schema.spec.namespace}
          labels:
            platform.io/team: ${schema.spec.team}
        spec: '${merge(schema.spec.resources.events.properties, {"name": schema.spec.name, "namespace": schema.spec.namespace, "serviceAccount": schema.spec.name + "-sa"})}'

    # === Deployment ===
    - id: deployment
      template:
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: ${schema.spec.name}
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/name: ${schema.spec.name}
            app.kubernetes.io/managed-by: platform
            platform.io/team: ${schema.spec.team}
        spec:
          replicas: 2
          selector:
            matchLabels:
              app.kubernetes.io/name: ${schema.spec.name}
          template:
            metadata:
              labels:
                app.kubernetes.io/name: ${schema.spec.name}
                platform.io/team: ${schema.spec.team}
            spec:
              serviceAccountName: ${schema.spec.name}-sa
              containers:
                - name: main
                  image: ${schema.spec.containers.main.image}
                  command: ${schema.spec.containers.main.command}
                  ports:
                    - containerPort: ${schema.spec.service.ports.http.port}
                  resources:
                    requests:
                      cpu: ${schema.spec.containers.main.resources.cpu}
                      memory: ${schema.spec.containers.main.resources.memory}
                  env:
                    - name: DATABASE_HOST
                      value: ${schema.spec.resources.database.type != "" ? database.status.endpoint : ""}
                    - name: DATABASE_PORT
                      value: ${schema.spec.resources.database.type != "" ? string(database.status.port) : ""}
                    - name: DATABASE_SECRET
                      value: ${schema.spec.resources.database.type != "" ? database.status.secretName : ""}
                    - name: CACHE_HOST
                      value: ${schema.spec.resources.cache.type != "" ? cache.status.endpoint : ""}
                    - name: CACHE_PORT
                      value: ${schema.spec.resources.cache.type != "" ? string(cache.status.port) : ""}
                    - name: EVENTS_TOPIC_ARN
                      value: ${schema.spec.resources.events.type != "" ? eventbus.status.topicArn : ""}
                    - name: EVENTS_QUEUE_URL
                      value: ${schema.spec.resources.events.type != "" ? eventbus.status.queueUrl : ""}

    # === Service ===
    - id: service
      template:
        apiVersion: v1
        kind: Service
        metadata:
          name: ${schema.spec.name}
          namespace: ${schema.spec.namespace}
          labels:
            platform.io/team: ${schema.spec.team}
        spec:
          selector:
            app.kubernetes.io/name: ${schema.spec.name}
          ports:
            - name: http
              port: 80
              targetPort: ${schema.spec.service.ports.http.port}
              protocol: ${schema.spec.service.ports.http.protocol}

    # === Ingress (conditional) ===
    - id: ingress
      includeWhen:
        - ${schema.spec.service.routes.public}
      template:
        apiVersion: networking.k8s.io/v1
        kind: Ingress
        metadata:
          name: ${schema.spec.name}
          namespace: ${schema.spec.namespace}
          labels:
            platform.io/team: ${schema.spec.team}
        spec:
          ingressClassName: alb
          rules:
            - host: ${schema.spec.service.routes.host}
              http:
                paths:
                  - path: /
                    pathType: Prefix
                    backend:
                      service:
                        name: ${schema.spec.name}
                        port:
                          number: 80
