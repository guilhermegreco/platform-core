apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: workload.kro.run
spec:
  schema:
    apiVersion: v1alpha1
    kind: Workload
    spec:
      name: string
      namespace: string | default="default"
      team: string | default="default"
      clusterName: string | default={{ .Values.defaults.clusterName | quote }}

      containers:
        main:
          image: string
          command: "[]string"
          variables: "map[string]string"
          resources:
            cpu: string | default="250m"
            memory: string | default="256Mi"

      service:
        ports:
          http:
            port: integer | default=8080
            protocol: string | default="TCP"
        routes:
          public: boolean | default=false
          host: string | default=""

      resources:
        database:
          type: string | default=""
          properties:
            engine: string | default="postgres"
            size: string | default="small"
            highAvailability: boolean | default=false
        cache:
          type: string | default=""
          properties:
            engine: string | default="redis"
            size: string | default="small"
        events:
          type: string | default=""
          properties:
            pattern: string | default="fanout"
            dlq: boolean | default=true

    status:
      replicas: ${deployment.status.availableReplicas}
      url: ${service.metadata.name}
      roleArn: ${role.status.ackResourceMetadata.arn}
      resources:
        database:
          host: ${database.status.endpoint}
          port: ${database.status.port}
        cache:
          host: ${cache.status.endpoint}
          port: ${cache.status.port}
        events:
          topicArn: ${eventbus.status.topicArn}
          queueUrl: ${eventbus.status.queueUrl}

  resources:
    # === ServiceAccount (one per workload) ===
    - id: serviceaccount
      template:
        apiVersion: v1
        kind: ServiceAccount
        metadata:
          name: ${schema.spec.name}-sa
          namespace: ${schema.spec.namespace}
          labels:
            platform.io/team: ${schema.spec.team}
            platform.io/workload: ${schema.spec.name}

    # === IAM Role (one per workload — all policies attach here) ===
    - id: role
      readyWhen:
        - ${has(role.status.ackResourceMetadata.arn)}
      template:
        apiVersion: iam.services.k8s.aws/v1alpha1
        kind: Role
        metadata:
          name: ${schema.spec.name}-role
          namespace: ${schema.spec.namespace}
          labels:
            platform.io/team: ${schema.spec.team}
        spec:
          name: ${schema.spec.name}-role
          assumeRolePolicyDocument: |
            {
              "Version": "2012-10-17",
              "Statement": [{
                "Effect": "Allow",
                "Principal": { "Service": "pods.eks.amazonaws.com" },
                "Action": ["sts:AssumeRole", "sts:TagSession"]
              }]
            }

    # === Pod Identity Association (one per workload) ===
    - id: podidentity
      template:
        apiVersion: eks.services.k8s.aws/v1alpha1
        kind: PodIdentityAssociation
        metadata:
          name: ${schema.spec.name}-pod-identity
          namespace: ${schema.spec.namespace}
        spec:
          clusterName: ${schema.spec.clusterName}
          namespace: ${schema.spec.namespace}
          serviceAccount: ${schema.spec.name}-sa
          roleARN: ${role.status.ackResourceMetadata.arn}

    # === Database (conditional) — passes roleArn for policy attachment ===
    - id: database
      includeWhen:
        - ${schema.spec.resources.database.type != ""}
      readyWhen:
        - ${has(database.status.endpoint)}
      template:
        apiVersion: kro.run/v1alpha1
        kind: Database
        metadata:
          name: ${schema.spec.name}-db
          namespace: ${schema.spec.namespace}
          labels:
            platform.io/team: ${schema.spec.team}
        spec:
          name: ${schema.spec.name}
          namespace: ${schema.spec.namespace}
          engine: ${schema.spec.resources.database.properties.engine}
          size: ${schema.spec.resources.database.properties.size}
          highAvailability: ${schema.spec.resources.database.properties.highAvailability}
          roleName: ${schema.spec.name}-role

    # === Cache (conditional) ===
    - id: cache
      includeWhen:
        - ${schema.spec.resources.cache.type != ""}
      readyWhen:
        - ${has(cache.status.endpoint)}
      template:
        apiVersion: kro.run/v1alpha1
        kind: Cache
        metadata:
          name: ${schema.spec.name}-cache
          namespace: ${schema.spec.namespace}
          labels:
            platform.io/team: ${schema.spec.team}
        spec:
          name: ${schema.spec.name}
          namespace: ${schema.spec.namespace}
          engine: ${schema.spec.resources.cache.properties.engine}
          size: ${schema.spec.resources.cache.properties.size}

    # === EventBus (conditional) — passes roleArn for policy attachment ===
    - id: eventbus
      includeWhen:
        - ${schema.spec.resources.events.type != ""}
      readyWhen:
        - ${has(eventbus.status.topicArn)}
      template:
        apiVersion: kro.run/v1alpha1
        kind: EventBus
        metadata:
          name: ${schema.spec.name}-events
          namespace: ${schema.spec.namespace}
          labels:
            platform.io/team: ${schema.spec.team}
        spec:
          name: ${schema.spec.name}
          namespace: ${schema.spec.namespace}
          type: ${schema.spec.resources.events.properties.pattern}
          dlq: ${schema.spec.resources.events.properties.dlq}
          roleName: ${schema.spec.name}-role

    # === Deployment ===
    - id: deployment
      template:
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: ${schema.spec.name}
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/name: ${schema.spec.name}
            app.kubernetes.io/managed-by: platform
            platform.io/team: ${schema.spec.team}
        spec:
          replicas: 2
          selector:
            matchLabels:
              app.kubernetes.io/name: ${schema.spec.name}
          template:
            metadata:
              labels:
                app.kubernetes.io/name: ${schema.spec.name}
                platform.io/team: ${schema.spec.team}
            spec:
              serviceAccountName: ${schema.spec.name}-sa
              containers:
                - name: main
                  image: ${schema.spec.containers.main.image}
                  command: ${schema.spec.containers.main.command}
                  ports:
                    - containerPort: ${schema.spec.service.ports.http.port}
                  resources:
                    requests:
                      cpu: ${schema.spec.containers.main.resources.cpu}
                      memory: ${schema.spec.containers.main.resources.memory}
                  env:
                    - name: DATABASE_HOST
                      value: '${schema.spec.resources.database.type != "" ? database.status.endpoint : ""}'
                    - name: DATABASE_PORT
                      value: '${schema.spec.resources.database.type != "" ? string(database.status.port) : ""}'
                    - name: CACHE_HOST
                      value: '${schema.spec.resources.cache.type != "" ? cache.status.endpoint : ""}'
                    - name: CACHE_PORT
                      value: '${schema.spec.resources.cache.type != "" ? string(cache.status.port) : ""}'
                    - name: EVENTS_TOPIC_ARN
                      value: '${schema.spec.resources.events.type != "" ? eventbus.status.topicArn : ""}'
                    - name: EVENTS_QUEUE_URL
                      value: '${schema.spec.resources.events.type != "" ? eventbus.status.queueUrl : ""}'

    # === Service ===
    - id: service
      template:
        apiVersion: v1
        kind: Service
        metadata:
          name: ${schema.spec.name}
          namespace: ${schema.spec.namespace}
          labels:
            platform.io/team: ${schema.spec.team}
        spec:
          selector:
            app.kubernetes.io/name: ${schema.spec.name}
          ports:
            - name: http
              port: 80
              targetPort: ${schema.spec.service.ports.http.port}
              protocol: ${schema.spec.service.ports.http.protocol}

    # === Ingress (conditional) ===
    - id: ingress
      includeWhen:
        - ${schema.spec.service.routes.public}
      template:
        apiVersion: networking.k8s.io/v1
        kind: Ingress
        metadata:
          name: ${schema.spec.name}
          namespace: ${schema.spec.namespace}
          labels:
            platform.io/team: ${schema.spec.team}
        spec:
          ingressClassName: alb
          rules:
            - host: ${schema.spec.service.routes.host}
              http:
                paths:
                  - path: /
                    pathType: Prefix
                    backend:
                      service:
                        name: ${schema.spec.name}
                        port:
                          number: 80
