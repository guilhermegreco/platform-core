apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ .Values.name }}
    app.kubernetes.io/managed-by: platform
    platform.io/team: {{ .Values.team }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Values.name }}
        platform.io/team: {{ .Values.team }}
    spec:
      serviceAccountName: {{ .Values.name }}-sa
      volumes:
        - name: eks-pod-identity-token
          projected:
            sources:
              - serviceAccountToken:
                  audience: pods.eks.amazonaws.com
                  expirationSeconds: 86400
                  path: eks-pod-identity-token
      containers:
        - name: main
          image: {{ .Values.image }}
          ports:
            - containerPort: {{ .Values.port }}
          readinessProbe:
            httpGet:
              path: /ready
              port: {{ .Values.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 30
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
          volumeMounts:
            - name: eks-pod-identity-token
              mountPath: /var/run/secrets/pods.eks.amazonaws.com/serviceaccount
              readOnly: true
          env:
            - name: AWS_CONTAINER_AUTHORIZATION_TOKEN_FILE
              value: "/var/run/secrets/pods.eks.amazonaws.com/serviceaccount/eks-pod-identity-token"
            - name: AWS_CONTAINER_CREDENTIALS_FULL_URI
              value: "http://169.254.170.23/v1/credentials"
            {{- if .Values.database.enabled }}
            {{- $dbSecret := ternary (printf "%s-conn" .Values.database.id) (printf "%s-db-conn" .Values.name) (eq (default "default" .Values.database.class) "existing") }}
            - name: DATABASE_HOST
              valueFrom:
                secretKeyRef:
                  name: {{ $dbSecret }}
                  key: host
            - name: DATABASE_PORT
              valueFrom:
                secretKeyRef:
                  name: {{ $dbSecret }}
                  key: port
            - name: DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: {{ $dbSecret }}
                  key: username
            - name: DATABASE_SECRET_ARN
              valueFrom:
                secretKeyRef:
                  name: {{ $dbSecret }}
                  key: secretArn
            {{- end }}
            {{- if .Values.events.enabled }}
            {{- $eventsSecret := ternary (printf "%s-conn" .Values.events.id) (printf "%s-events-conn" .Values.name) (eq (default "default" .Values.events.class) "existing") }}
            - name: EVENTS_TOPIC_ARN
              valueFrom:
                secretKeyRef:
                  name: {{ $eventsSecret }}
                  key: topicArn
            - name: EVENTS_QUEUE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ $eventsSecret }}
                  key: queueUrl
            {{- end }}
            {{- if .Values.cache.enabled }}
            {{- $cacheSecret := ternary (printf "%s-conn" .Values.cache.id) (printf "%s-cache-conn" .Values.name) (eq (default "default" .Values.cache.class) "existing") }}
            - name: CACHE_HOST
              valueFrom:
                secretKeyRef:
                  name: {{ $cacheSecret }}
                  key: host
            - name: CACHE_PORT
              valueFrom:
                secretKeyRef:
                  name: {{ $cacheSecret }}
                  key: port
            {{- end }}
