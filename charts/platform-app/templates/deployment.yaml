apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ .Values.name }}
    app.kubernetes.io/managed-by: platform
    platform.io/team: {{ .Values.team }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Values.name }}
        platform.io/team: {{ .Values.team }}
    spec:
      serviceAccountName: {{ .Values.name }}-sa
      containers:
        - name: main
          image: {{ .Values.image }}
          ports:
            - containerPort: {{ .Values.port }}
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
          env:
            {{- if .Values.database.enabled }}
            - name: DATABASE_HOST
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.name }}-db-conn
                  key: host
            - name: DATABASE_PORT
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.name }}-db-conn
                  key: port
            - name: DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.name }}-db-conn
                  key: username
            {{- end }}
            {{- if .Values.events.enabled }}
            - name: EVENTS_TOPIC_ARN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.name }}-events-conn
                  key: topicArn
            - name: EVENTS_QUEUE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.name }}-events-conn
                  key: queueUrl
            {{- end }}
            {{- if .Values.cache.enabled }}
            - name: CACHE_HOST
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.name }}-cache-conn
                  key: host
            - name: CACHE_PORT
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.name }}-cache-conn
                  key: port
            {{- end }}
