{{- if .Values.route.enabled }}
{{- /*
  FQDN-per-namespace, path-per-microservice on a shared ALB (EKS Auto Mode).

  - host  is derived from the NAMESPACE (platform topology), never the developer:
        <namespace>.<platform.ingress.domain>
    Every platform-app release in the same namespace renders the SAME host, so
    they all surface under one FQDN.
  - the shared-ALB merge is driven by group.name in the per-namespace
    IngressClassParams (created by the tenant RGD), which platform.ingress.className
    references — NOT by an Ingress annotation (Auto Mode ignores that). All releases
    in a namespace point at the same IngressClass, so they merge onto ONE ALB.
  - path  is the one routing choice the developer makes; defaults to "/<name>".

  IMPORTANT — no edge rewrite: EKS Auto Mode's managed ALB silently drops the
  `transforms` (path-rewrite) annotation. The /<name> prefix is NOT stripped, so
  the workload MUST be prefix-aware (serve under "/<name>"). See values.yaml.
*/}}
{{- if not .Values.platform.ingress.domain }}{{ fail "platform.ingress.domain is required when route.enabled is true (platform-injected, e.g. apps.staging.example.com)" }}{{- end }}
{{- if not .Values.platform.ingress.className }}{{ fail "platform.ingress.className is required when route.enabled is true (the per-namespace IngressClass created by the tenant RGD, e.g. team-shop-prod-alb)" }}{{- end }}
{{- $host := printf "%s.%s" .Values.namespace .Values.platform.ingress.domain }}
{{- $path := .Values.route.path | default (printf "/%s" .Values.name) }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ .Values.name }}
    app.kubernetes.io/managed-by: platform
    platform.io/team: {{ .Values.team }}
    platform.io/workload: {{ .Values.name }}
  annotations:
    # NOTE: group.name and scheme are NOT set here. On EKS Auto Mode the managed ALB
    # controller IGNORES the alb.ingress.kubernetes.io/group.name annotation (it would
    # create a separate ALB per Ingress). Both group.name and scheme are configured in
    # the per-namespace IngressClassParams (created by the tenant RGD) that
    # platform.ingress.className points at — that is what merges all of a namespace's
    # Ingresses onto ONE shared ALB.
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/healthcheck-path: {{ .Values.readinessProbe.path | quote }}
    alb.ingress.kubernetes.io/healthcheck-port: {{ .Values.port | quote }}
spec:
  ingressClassName: {{ .Values.platform.ingress.className }}
  rules:
    - host: {{ $host }}
      http:
        paths:
          - path: {{ $path }}
            pathType: {{ .Values.route.pathType | default "Prefix" }}
            backend:
              service:
                name: {{ .Values.name }}
                port:
                  number: 80
{{- end }}
