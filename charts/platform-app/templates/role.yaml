apiVersion: iam.services.k8s.aws/v1alpha1
kind: Role
metadata:
  name: {{ .Values.name }}-role
  namespace: {{ .Values.namespace }}
  labels:
    platform.io/team: {{ .Values.team }}
    platform.io/workload: {{ .Values.name }}
  annotations:
    # The AWS IAM role name (spec.name) is account-global (IAM is not cluster-scoped). It is
    # now qualified per-cluster via platform-app.roleName (<clusterName>-<name>-role) so two
    # runtimes running a same-named app no longer resolve to ONE account-global role — see
    # _helpers.tpl. adopt-or-create still handles the same-cluster re-run case: on a re-apply
    # the role already exists, and a create-mode ACK CR would hit `ACK.Terminal: Resource
    # already exists` and never reconcile spec.policies → the workload policy is NOT attached
    # → the pod gets AccessDenied on its DB secret / SQS / cache (validated live on rt-p5d:
    # /db failed with AccessDeniedException until the role was recreated). adopt-or-create
    # makes ACK adopt the existing role and reconcile the policy attachment.
    services.k8s.aws/adoption-policy: "adopt-or-create"
spec:
  name: {{ include "platform-app.roleName" . }}
  assumeRolePolicyDocument: |
    {
      "Version": "2012-10-17",
      "Statement": [{
        "Effect": "Allow",
        "Principal": { "Service": "pods.eks.amazonaws.com" },
        "Action": ["sts:AssumeRole", "sts:TagSession"]
      }]
    }
  {{- if or .Values.database.enabled .Values.events.enabled .Values.cache.enabled }}
  policies:
    - {{ printf "arn:aws:iam::%s:policy/%s" (.Values.accountId | toString) (include "platform-app.policyName" .) }}
  {{- end }}
