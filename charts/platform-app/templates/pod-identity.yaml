apiVersion: eks.services.k8s.aws/v1alpha1
kind: PodIdentityAssociation
metadata:
  name: {{ .Values.name }}-pod-identity
  namespace: {{ .Values.namespace }}
  labels:
    platform.io/team: {{ .Values.team }}
    platform.io/workload: {{ .Values.name }}
spec:
  clusterName: {{ .Values.clusterName }}
  namespace: {{ .Values.namespace }}
  serviceAccount: {{ .Values.name }}-sa
  # roleARN must match the per-cluster-qualified role minted by role.yaml (platform-app.roleName).
  roleARN: {{ printf "arn:aws:iam::%s:role/%s" (.Values.accountId | toString) (include "platform-app.roleName" .) }}
