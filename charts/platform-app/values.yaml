name: my-app
team: default
namespace: default

# NOTE: The default image (nginx:latest) does not serve /ready. When using the
# default readinessProbe path, replace this with an image that serves that endpoint.
image: nginx:latest
port: 8080
replicas: 2

clusterName: plat-cp-cluster
accountId: "279051970617"
region: us-east-1

# platform.ingress is PLATFORM-INJECTED (e.g. via the ArgoCD ApplicationSet / per-env
# values), NOT set by developers. It carries ingress topology so the FQDN and the
# shared ALB are uniform across every release in a namespace.
#   - domain:    base domain; the per-namespace FQDN is "<namespace>.<domain>".
#                A wildcard cert "*.<domain>" is expected to cover it (TLS wired later).
#   - className: the per-NAMESPACE IngressClass created by the tenant RGD
#                (e.g. "team-shop-prod-alb"). Its IngressClassParams carries group.name
#                + scheme, which is what merges all of a namespace's Ingresses onto ONE
#                ALB. group/scheme are NOT set on the Ingress here — Auto Mode ignores
#                the group.name annotation (verified), so it must live in the class.
platform:
  ingress:
    domain: ""               # required when route.enabled (e.g. apps.staging.example.com)
    className: ""            # required when route.enabled; the namespace's IngressClass

# readinessProbe configures the HTTP readiness probe for the main container.
# path must be served by your application; the default /ready requires your image to implement it.
readinessProbe:
  path: /ready
  initialDelaySeconds: 10
  periodSeconds: 10
  failureThreshold: 30

# route exposes this microservice externally through the shared, per-namespace ALB.
# Model: one FQDN per namespace (<namespace>.<platform.ingress.domain>), routed by
# PATH to each microservice in that namespace. All releases in a namespace merge onto
# ONE ALB (IngressGroup). The developer sets intent only — host/cert/group/scheme are
# platform-injected (see platform.ingress below), so topology never leaks into app values.
#
# PREFIX-AWARENESS IS REQUIRED: EKS Auto Mode's managed ALB does NOT strip the path
# prefix (the `transforms` rewrite annotation is silently ignored). Your service receives
# requests beginning with its path (e.g. "/my-app/..."). You MUST configure your framework
# to serve under that base path (Spring server.servlet.context-path, Express app.use(prefix),
# FastAPI root_path, Next.js basePath, Django FORCE_SCRIPT_NAME, etc.) — including your
# readiness/liveness probe paths, redirects, cookies (scope to the path), and static assets.
route:
  enabled: false
  path: ""          # path under the namespace FQDN; defaults to "/<name>" when empty
  pathType: Prefix

database:
  enabled: false
  class: default    # "default" = provision new, "existing" = bind to shared resource in the SAME namespace
  id: ""            # owner app's name (e.g. "shared"); required when class=existing. Cross-namespace binding is not supported — IAM tag conditions would deny access.
  size: small
  engine: postgres
  highAvailability: false

cache:
  enabled: false
  class: default    # "default" = provision new, "existing" = bind to shared resource in the SAME namespace
  id: ""            # owner app's name; required when class=existing. Cross-namespace binding is not supported.
  size: small
  engine: redis

events:
  enabled: false
  class: default    # "default" = provision new, "existing" = bind to shared resource in the SAME namespace
  id: ""            # owner app's name; required when class=existing. Cross-namespace binding is not supported.
  pattern: fanout
  dlq: true
