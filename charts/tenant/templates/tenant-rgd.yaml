apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: tenant.kro.run
spec:
  schema:
    apiVersion: v1alpha1
    kind: Tenant
    spec:
      team: string
      environments: "[]string"
      quotas:
        maxCpu: string | default="8"
        maxMemory: string | default="16Gi"
        maxApps: string | default={{ .Values.defaults.maxApps | quote }}
        maxDatabases: string | default={{ .Values.defaults.maxDatabases | quote }}
        maxCaches: string | default={{ .Values.defaults.maxCaches | quote }}
    status:
      # Must be a CEL expression — current kro rejects literal status values
      # ("status fields without expressions are not supported"). A constant
      # expression satisfies that; the tenant has no single underlying resource to
      # gate on (it fans out namespaces/classes/quotas per environment).
      ready: ${"true"}

  resources:
    # Namespace per environment
    - id: namespaces
      forEach:
        - env: ${schema.spec.environments}
      template:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: team-${schema.spec.team}-${env}
          labels:
            platform.io/team: ${schema.spec.team}
            platform.io/environment: ${env}
            platform.io/managed-by: tenant-controller

    # Per-namespace ALB grouping for EKS Auto Mode.
    #
    # The "one shared ALB per namespace" model REQUIRES group.name to live in an
    # IngressClassParams — EKS Auto Mode's managed ALB controller IGNORES the
    # alb.ingress.kubernetes.io/group.name *annotation* (verified: it creates a
    # separate ALB per Ingress when group is set via annotation). Each namespace
    # therefore gets its own IngressClass (`team-<team>-<env>-alb`) whose params
    # carry a unique group.name, so every platform-app Ingress in that namespace
    # merges onto ONE ALB. Apps reference this class via
    # platform.ingress.className = "<namespace>-alb".
    - id: ingressclassparams
      forEach:
        - env: ${schema.spec.environments}
      template:
        apiVersion: eks.amazonaws.com/v1
        kind: IngressClassParams
        metadata:
          name: team-${schema.spec.team}-${env}-alb
          labels:
            platform.io/team: ${schema.spec.team}
            platform.io/environment: ${env}
            platform.io/managed-by: tenant-controller
        spec:
          scheme: {{ .Values.defaults.ingressScheme | default "internal" | quote }}
          group:
            name: team-${schema.spec.team}-${env}

    - id: ingressclass
      forEach:
        - env: ${schema.spec.environments}
      template:
        apiVersion: networking.k8s.io/v1
        kind: IngressClass
        metadata:
          name: team-${schema.spec.team}-${env}-alb
          labels:
            platform.io/team: ${schema.spec.team}
            platform.io/environment: ${env}
            platform.io/managed-by: tenant-controller
        spec:
          controller: eks.amazonaws.com/alb
          parameters:
            apiGroup: eks.amazonaws.com
            kind: IngressClassParams
            name: team-${schema.spec.team}-${env}-alb

    # ResourceQuota per namespace
    - id: quotas
      forEach:
        - env: ${schema.spec.environments}
      template:
        apiVersion: v1
        kind: ResourceQuota
        metadata:
          name: team-quota
          namespace: team-${schema.spec.team}-${env}
        spec:
          hard:
            requests.cpu: ${schema.spec.quotas.maxCpu}
            requests.memory: ${schema.spec.quotas.maxMemory}
            count/deployments.apps: ${schema.spec.quotas.maxApps}
            count/databases.kro.run: ${schema.spec.quotas.maxDatabases}
            count/caches.kro.run: ${schema.spec.quotas.maxCaches}

    # Role for workload management
    - id: roles
      forEach:
        - env: ${schema.spec.environments}
      template:
        apiVersion: rbac.authorization.k8s.io/v1
        kind: Role
        metadata:
          name: workload-manager
          namespace: team-${schema.spec.team}-${env}
        rules:
          - apiGroups: ["kro.run"]
            resources: ["workloads"]
            verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]
          - apiGroups: ["kro.run"]
            resources: ["databases", "caches", "eventbuses"]
            verbs: ["get", "list", "watch"]
          - apiGroups: [""]
            resources: ["pods", "services", "pods/log"]
            verbs: ["get", "list", "watch"]
          - apiGroups: ["apps"]
            resources: ["deployments"]
            verbs: ["get", "list", "watch"]

    # RoleBinding for team group
    - id: rolebindings
      forEach:
        - env: ${schema.spec.environments}
      template:
        apiVersion: rbac.authorization.k8s.io/v1
        kind: RoleBinding
        metadata:
          name: workload-managers
          namespace: team-${schema.spec.team}-${env}
        roleRef:
          apiGroup: rbac.authorization.k8s.io
          kind: Role
          name: workload-manager
        subjects:
          - kind: Group
            name: team-${schema.spec.team}
            apiGroup: rbac.authorization.k8s.io

    # NetworkPolicy (deny ingress from other teams)
    - id: netpol
      forEach:
        - env: ${schema.spec.environments}
      template:
        apiVersion: networking.k8s.io/v1
        kind: NetworkPolicy
        metadata:
          name: deny-cross-team
          namespace: team-${schema.spec.team}-${env}
        spec:
          podSelector: {}
          policyTypes: ["Ingress"]
          ingress:
            - from:
                - namespaceSelector:
                    matchLabels:
                      platform.io/team: ${schema.spec.team}
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: platform-system
