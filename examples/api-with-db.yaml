apiVersion: kro.run/v1alpha1
kind: Workload
metadata:
  name: orders-api
  namespace: team-commerce-prod
spec:
  name: orders-api
  team: commerce

  containers:
    main:
      image: 123456789.dkr.ecr.us-east-1.amazonaws.com/orders:v2.1
      variables:
        LOG_LEVEL: "info"
        ENABLE_TRACING: "true"
      resources:
        cpu: "500m"
        memory: "512Mi"

  service:
    ports:
      http:
        port: 8080
    routes:
      public: true
      host: orders.example.com

  resources:
    database:
      type: postgres
      properties:
        size: medium
        highAvailability: true
    cache:
      type: redis
      properties:
        size: small
