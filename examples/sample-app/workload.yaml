apiVersion: kro.run/v1alpha1
kind: Workload
metadata:
  name: sample-app
  namespace: team-commerce-dev
spec:
  name: sample-app
  team: commerce

  containers:
    main:
      image: 279051970617.dkr.ecr.us-east-1.amazonaws.com/sample-app:latest
      resources:
        cpu: "256m"
        memory: "256Mi"

  service:
    ports:
      http:
        port: 8080
    routes:
      public: true
      host: sample-app.dev.internal

  resources:
    database:
      type: postgres
      properties:
        size: small
        highAvailability: false
    cache:
      type: redis
      properties:
        size: small
    events:
      type: pubsub
      properties:
        pattern: fanout
        dlq: true
