name: Setup Platform CI
description: Sets up the standard platform CI environment with pinned versions

inputs:
  mode:
    description: "Test mode: 'fake' (Tier 1, CRDs only) or 'real' (Tier 2, full ACK controllers)"
    required: false
    default: "fake"
  ack-controllers:
    description: "Comma-separated list of ACK controllers to install in real mode (rds, elasticache, sns, sqs)"
    required: false
    default: "rds"
  aws-region:
    description: "AWS region for ACK controllers"
    required: false
    default: "us-east-1"

runs:
  using: composite
  steps:
    - name: Set pinned versions
      shell: bash
      run: |
        echo "K3D_VERSION=v5.7.5" >> $GITHUB_ENV
        echo "KRO_CHART_VERSION=0.9.2" >> $GITHUB_ENV
        echo "ACK_RDS_CHART_VERSION=1.8.0" >> $GITHUB_ENV
        echo "ACK_ELASTICACHE_CHART_VERSION=1.0.1" >> $GITHUB_ENV
        echo "ACK_SNS_CHART_VERSION=1.0.14" >> $GITHUB_ENV
        echo "ACK_SQS_CHART_VERSION=1.0.16" >> $GITHUB_ENV
        echo "ACK_IAM_CHART_VERSION=1.3.15" >> $GITHUB_ENV
        echo "ACK_EC2_CHART_VERSION=1.13.1" >> $GITHUB_ENV
        echo "ACK_EKS_CHART_VERSION=1.13.1" >> $GITHUB_ENV

    - name: Install k3d
      shell: bash
      run: |
        curl -s https://raw.githubusercontent.com/k3d-io/k3d/${{ env.K3D_VERSION }}/install.sh | bash

    - name: Create k3d cluster
      shell: bash
      run: |
        k3d cluster create test --agents 1 --no-lb \
          --k3s-arg "--disable=traefik@server:*" \
          --k3s-arg "--disable=metrics-server@server:*" \
          --wait
        kubectl cluster-info

    - name: Install kro
      shell: bash
      run: |
        helm install kro oci://registry.k8s.io/kro/charts/kro \
          --version ${{ env.KRO_CHART_VERSION }} \
          --namespace kro-system \
          --create-namespace \
          --wait --timeout 120s

    - name: Install ACK CRDs (fake mode)
      if: inputs.mode == 'fake'
      shell: bash
      run: |
        kubectl apply -f https://raw.githubusercontent.com/aws-controllers-k8s/rds-controller/v${{ env.ACK_RDS_CHART_VERSION }}/config/crd/bases/rds.services.k8s.aws_dbinstances.yaml
        kubectl apply -f https://raw.githubusercontent.com/aws-controllers-k8s/rds-controller/v${{ env.ACK_RDS_CHART_VERSION }}/config/crd/bases/rds.services.k8s.aws_dbparametergroups.yaml
        kubectl apply -f https://raw.githubusercontent.com/aws-controllers-k8s/iam-controller/v${{ env.ACK_IAM_CHART_VERSION }}/config/crd/bases/iam.services.k8s.aws_policies.yaml
        kubectl apply -f https://raw.githubusercontent.com/aws-controllers-k8s/elasticache-controller/v${{ env.ACK_ELASTICACHE_CHART_VERSION }}/config/crd/bases/elasticache.services.k8s.aws_replicationgroups.yaml
        kubectl apply -f https://raw.githubusercontent.com/aws-controllers-k8s/sns-controller/v${{ env.ACK_SNS_CHART_VERSION }}/config/crd/bases/sns.services.k8s.aws_topics.yaml
        kubectl apply -f https://raw.githubusercontent.com/aws-controllers-k8s/sns-controller/v${{ env.ACK_SNS_CHART_VERSION }}/config/crd/bases/sns.services.k8s.aws_subscriptions.yaml
        kubectl apply -f https://raw.githubusercontent.com/aws-controllers-k8s/sqs-controller/v${{ env.ACK_SQS_CHART_VERSION }}/config/crd/bases/sqs.services.k8s.aws_queues.yaml
        kubectl apply -f https://raw.githubusercontent.com/aws-controllers-k8s/ec2-controller/v${{ env.ACK_EC2_CHART_VERSION }}/config/crd/bases/ec2.services.k8s.aws_securitygroups.yaml
        # EKS/runtime capability (platform-capability-eks): Cluster + Capability + AccessEntry
        kubectl apply -f https://raw.githubusercontent.com/aws-controllers-k8s/eks-controller/v${{ env.ACK_EKS_CHART_VERSION }}/config/crd/bases/eks.services.k8s.aws_clusters.yaml
        kubectl apply -f https://raw.githubusercontent.com/aws-controllers-k8s/eks-controller/v${{ env.ACK_EKS_CHART_VERSION }}/config/crd/bases/eks.services.k8s.aws_capabilities.yaml
        kubectl apply -f https://raw.githubusercontent.com/aws-controllers-k8s/eks-controller/v${{ env.ACK_EKS_CHART_VERSION }}/config/crd/bases/eks.services.k8s.aws_accessentries.yaml

    - name: Install ACK controllers (real mode)
      if: inputs.mode == 'real'
      shell: bash
      run: |
        IFS=',' read -ra CONTROLLERS <<< "${{ inputs.ack-controllers }}"
        for ctrl in "${CONTROLLERS[@]}"; do
          echo "Installing ACK $ctrl controller..."
          helm install ack-$ctrl oci://public.ecr.aws/aws-controllers-k8s/${ctrl}-chart \
            --namespace ack-system \
            --create-namespace \
            --set aws.region=${{ inputs.aws-region }} \
            --set "deployment.extraEnvVars[0].name=AWS_ACCESS_KEY_ID" \
            --set "deployment.extraEnvVars[0].value=$AWS_ACCESS_KEY_ID" \
            --set "deployment.extraEnvVars[1].name=AWS_SECRET_ACCESS_KEY" \
            --set "deployment.extraEnvVars[1].value=$AWS_SECRET_ACCESS_KEY" \
            --set "deployment.extraEnvVars[2].name=AWS_SESSION_TOKEN" \
            --set "deployment.extraEnvVars[2].value=$AWS_SESSION_TOKEN" \
            --set "deployment.extraEnvVars[3].name=AWS_DEFAULT_REGION" \
            --set "deployment.extraEnvVars[3].value=${{ inputs.aws-region }}" \
            --wait --timeout 120s
        done

    - name: Install Chainsaw
      shell: bash
      run: |
        CHAINSAW_VERSION=v0.2.14
        curl -sL https://github.com/kyverno/chainsaw/releases/download/${CHAINSAW_VERSION}/chainsaw_linux_amd64.tar.gz | tar xz
        sudo mv chainsaw /usr/local/bin/
        echo "CHAINSAW_VERSION=${CHAINSAW_VERSION}" >> $GITHUB_ENV

    - name: Install kubeconform
      shell: bash
      run: |
        KUBECONFORM_VERSION=v0.6.7
        curl -sL https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz | tar xz
        sudo mv kubeconform /usr/local/bin/
