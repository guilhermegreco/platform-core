# Reusable capability pipeline (governed by the platform team).
#
# ── Supply-chain pinning (production hardening) ────────────────────────────────
# Capability caller workflows reference this reusable workflow as
# `guilhermegreco/platform-core/.github/workflows/capability-pipeline.yaml@main`.
# `@main` is a MOVING ref: a push to platform-core main instantly changes what
# every capability pipeline executes, with no review gate in the calling repo.
# RECOMMENDATION (must be applied in the CAPABILITY repos, out of scope for this
# PR which can only touch platform-core): pin the caller `uses:` to an immutable
# git tag or full commit SHA (e.g. `@v1.4.0` or `@<40-char-sha>`) and bump it via
# a reviewed PR. The two internal `uses:` refs to the setup-platform-ci composite
# action below are `@main` for the same reason and should be pinned to a tag/SHA
# once this workflow itself is tag-released. Dependabot / renovate can automate
# the bumps while keeping the review gate.
#
# ── AWS credential separation (production hardening) ───────────────────────────
# This workflow assumes AWS roles for two DISTINCT trust levels:
#   * publish            → push Helm charts + git tags        (ECR write only)
#   * real-infra-test    → provision/destroy real AWS infra   (broad RDS/EC2/…/IAM)
# Historically all jobs used a single `vars.ECR_PUSH_ROLE`, which forced the
# narrow publish path to carry (or share a role with) broad provisioning
# permissions. The jobs below now read SEPARATE role vars:
#   * publish         → vars.ECR_PUBLISH_ROLE  (fallback: vars.ECR_PUSH_ROLE)
#   * real-infra-test → vars.REAL_INFRA_ROLE   (fallback: vars.ECR_PUSH_ROLE)
# Fallbacks preserve back-compat for repos that have not yet defined the split
# vars. HUMAN FOLLOW-UP (control-plane / out-of-band, cannot be done here):
# create two least-privilege IAM roles — a narrow ECR-only role for publishing,
# and a scoped provisioning role for real-infra-test — then set the new repo/org
# `vars` so the fallbacks stop being used.
name: Capability Pipeline
on:
  workflow_call:
    inputs:
      chart-path:
        required: true
        type: string
        default: chart
      tests-path:
        required: true
        type: string
        default: tests/tier2
      capability-name:
        required: true
        type: string
      ack-controllers:
        required: true
        type: string
        default: "rds"
      assert-timeout:
        required: false
        type: string
        default: "15m"
      delete-timeout:
        required: false
        type: string
        default: "5m"
      # Production hardening: gate the bot self-merge of the staging bump PR.
      # Default `true` KEEPS the current operating model (the pipeline opens AND
      # auto-merges the staging bump) so this change is non-breaking. Set to
      # `false` in a caller to make the pipeline OPEN the PR but leave the merge
      # to a human (or to branch protection + CODEOWNERS review) — see the
      # bump-staging job and CODEOWNERS for the recommended separation-of-duties.
      auto-merge-staging-bump:
        required: false
        type: boolean
        default: true
      # Give real-infra-test a UNIQUE instance name per run (default OFF → the 3 data
      # capabilities keep their fixed tier2 instance name). Needed by the EKS/Runtime
      # capability: the ARGOCD capability creates an account-global, fixed-name IAM
      # Identity Center *application*, and every capability CR is deletePropagationPolicy:
      # RETAIN — so teardown does NOT delete the IdC app. With a FIXED instance name
      # (ci-rt-test), the next run's ARGOCD capability collides with the orphaned IdC app
      # → CREATE_FAILED → the capability never goes ACTIVE → the capability-argocd assert
      # times out. Confirmed live: a uniquely-named spoke (rt-diag) provisions the argocd
      # capability cleanly; the reused ci-rt-test name does not. Substituting a per-run
      # name (ci-rt-<run_id>) sidesteps the orphan collision. (Roles/IdC apps still orphan
      # under RETAIN, but never collide — a separate cleanup concern, tracked separately.)
      unique-instance-name:
        required: false
        type: boolean
        default: false

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - run: helm lint ${{ inputs.chart-path }}
      - run: helm template test ${{ inputs.chart-path }} > /dev/null

  tier1:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: Setup platform CI (fake)
        uses: guilhermegreco/platform-core/.github/actions/setup-platform-ci@main
        with:
          mode: fake
      - name: Deploy RGD
        run: |
          helm template test ${{ inputs.chart-path }} | kubectl apply -f -
          sleep 15
      - name: Verify RGD is Active
        run: |
          STATE=$(kubectl get rgd ${{ inputs.capability-name }}.kro.run -o jsonpath='{.status.state}')
          echo "RGD state: $STATE"
          if [ "$STATE" != "Active" ]; then
            kubectl describe rgd ${{ inputs.capability-name }}.kro.run
            exit 1
          fi
      - name: Collect debug info
        if: failure()
        run: |
          kubectl get rgd -A -o yaml
          kubectl logs -n kro-system -l app.kubernetes.io/name=kro --tail=100

  real-infra-test:
    needs: tier1
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          # Scoped provisioning role: creates/destroys real AWS infra (RDS, EC2,
          # ElastiCache, SNS/SQS, IAM for the resources under test). Falls back to
          # ECR_PUSH_ROLE for back-compat until the split role is provisioned.
          role-to-assume: ${{ vars.REAL_INFRA_ROLE || vars.ECR_PUSH_ROLE }}
          aws-region: us-east-1

      - name: Setup platform CI (real)
        uses: guilhermegreco/platform-core/.github/actions/setup-platform-ci@main
        with:
          mode: real
          ack-controllers: ${{ inputs.ack-controllers }}

      - name: Validate test structure
        run: |
          if [ ! -f ${{ inputs.tests-path }}/instance.yaml ]; then
            echo "FAIL: Missing ${{ inputs.tests-path }}/instance.yaml"
            exit 1
          fi
          if [ -z "$(ls ${{ inputs.tests-path }}/assertions/*.yaml 2>/dev/null)" ]; then
            echo "FAIL: No assertion files in ${{ inputs.tests-path }}/assertions/"
            exit 1
          fi
          if [ ! -f ${{ inputs.tests-path }}/cleanup.yaml ]; then
            echo "FAIL: Missing ${{ inputs.tests-path }}/cleanup.yaml"
            exit 1
          fi

      # Rewrite the fixed tier2 instance name to a UNIQUE per-run name so this run's
      # account-global fixed-name resources (esp. the ARGOCD capability's RETAIN'd IdC
      # application) do not collide with orphans from prior runs. Opt-in; only the caller
      # that sets unique-instance-name: true (the EKS/Runtime capability) is affected. All
      # derived names are "<stem>-<suffix>" (e.g. ci-rt-test-argocd), so a single sed over
      # instance.yaml + cleanup.yaml + assertions/*.yaml keeps every reference consistent.
      - name: Uniquify instance name (opt-in)
        if: ${{ inputs.unique-instance-name }}
        run: |
          OLD="ci-rt-test"
          NEW="ci-rt-${{ github.run_id }}"
          # EKS cluster names must be <=100 chars and the run_id keeps us well under; no trunc needed.
          echo "Rewriting tier2 instance name: $OLD -> $NEW"
          for f in ${{ inputs.tests-path }}/instance.yaml ${{ inputs.tests-path }}/cleanup.yaml ${{ inputs.tests-path }}/assertions/*.yaml; do
            [ -f "$f" ] || continue
            sed -i "s/${OLD}/${NEW}/g" "$f"
          done
          echo "--- rewritten instance.yaml ---"; cat ${{ inputs.tests-path }}/instance.yaml

      - name: Deploy RGD (previous from ECR, or current if first time)
        run: |
          aws ecr get-login-password --region us-east-1 | \
            helm registry login --username AWS --password-stdin ${{ vars.ECR_REGISTRY }} 2>/dev/null || true

          if helm template prev oci://${{ vars.ECR_REGISTRY }}/${{ vars.PROJECT }}/charts/team-${{ inputs.capability-name }} 2>/dev/null | kubectl apply -f -; then
            echo "UPGRADE_MODE=true" >> $GITHUB_ENV
            echo "Previous RGD deployed (will test upgrade path)"
          else
            echo "UPGRADE_MODE=false" >> $GITHUB_ENV
            echo "No previous version in ECR (first deploy) — using current RGD"
            helm template test ${{ inputs.chart-path }} | kubectl apply -f -
          fi

          # Wait for the RGD to become Active — kro registers the instance CRD
          # (e.g. Runtime/Database) ASYNCHRONOUSLY after accepting the graph. A fixed
          # sleep is a race: heavier RGDs (the EKS Runtime RGD validates an Argo CD
          # Application + cross-resource CEL) register their CRD slower than the ~15s that
          # sufficed for simple data capabilities, so Chainsaw's create-instance hit
          # `no matches for kind "Runtime" in version kro.run/v1alpha1`. Gate on Active,
          # then confirm the CRD is actually served before Chainsaw applies the instance.
          RGD="${{ inputs.capability-name }}.kro.run"
          kubectl wait "rgd/${RGD}" --for=jsonpath='{.status.state}'=Active --timeout=120s
          KIND=$(kubectl get "rgd/${RGD}" -o jsonpath='{.spec.schema.kind}')
          for i in $(seq 1 30); do
            kubectl get crd -o name | grep -qi "${KIND,,}s.kro.run" && break
            sleep 4
          done

      - name: Generate Phase 1 Chainsaw test (create + wait)
        run: |
          cat > ${{ inputs.tests-path }}/phase1-chainsaw-test.yaml << EOF
          apiVersion: chainsaw.kyverno.io/v1alpha1
          kind: Test
          metadata:
            name: ${{ inputs.capability-name }}-provision
          spec:
            namespace: default
            timeouts:
              apply: 30s
              assert: ${{ inputs.assert-timeout }}
            steps:
              - name: create-instance
                try:
                  - apply:
                      file: instance.yaml
              - name: wait-for-available
                try:
                  - assert:
                      file: "assertions/available.yaml"
          EOF

      - name: "Phase 1: Provision + wait for available"
        run: chainsaw test ${{ inputs.tests-path }}/ --test-file phase1-chainsaw-test --namespace default --skip-delete

      - name: "Phase 2: Apply NEW RGD (upgrade)"
        if: env.UPGRADE_MODE == 'true'
        run: |
          echo "Upgrading RGD to current branch version..."
          helm template test ${{ inputs.chart-path }} | kubectl apply -f -
          echo "New RGD applied. kro will reconcile the existing instance..."
          sleep 15

      - name: "Phase 2: Verify instance not ERROR after upgrade"
        if: env.UPGRADE_MODE == 'true'
        run: |
          INSTANCE_NAME=$(kubectl get -f ${{ inputs.tests-path }}/instance.yaml -o jsonpath='{.metadata.name}')
          KIND=$(kubectl get -f ${{ inputs.tests-path }}/instance.yaml -o jsonpath='{.kind}')
          echo "Checking $KIND/$INSTANCE_NAME state..."
          for i in $(seq 1 10); do
            STATE=$(kubectl get -f ${{ inputs.tests-path }}/instance.yaml -o jsonpath='{.status.state}' 2>/dev/null || echo "UNKNOWN")
            echo "  Attempt $i/10: state=$STATE"
            if [ "$STATE" = "ERROR" ]; then
              echo "FAIL: Instance went ERROR after upgrade"
              kubectl describe -f ${{ inputs.tests-path }}/instance.yaml
              exit 1
            fi
            if [ "$STATE" = "ACTIVE" ]; then
              echo "PASS: Instance is ACTIVE after upgrade"
              break
            fi
            sleep 5
          done

      - name: Generate Phase 3 Chainsaw test (assertions + cleanup)
        run: |
          cat > ${{ inputs.tests-path }}/phase3-chainsaw-test.yaml << EOF
          apiVersion: chainsaw.kyverno.io/v1alpha1
          kind: Test
          metadata:
            name: ${{ inputs.capability-name }}-verify-and-cleanup
          spec:
            namespace: default
            timeouts:
              apply: 30s
              assert: ${{ inputs.assert-timeout }}
              error: 2m
              delete: ${{ inputs.delete-timeout }}
            steps:
              - name: verify-all-assertions
                try:
                  - assert:
                      file: "assertions/*.yaml"
                catch:
                  - podLogs:
                      selector: app.kubernetes.io/name=kro
                      namespace: kro-system
              - name: delete-instance
                try:
                  - delete:
                      file: cleanup.yaml
              - name: verify-cleanup
                try:
                  - error:
                      file: "assertions/available.yaml"
                catch:
                  - podLogs:
                      selector: app.kubernetes.io/name=kro
                      namespace: kro-system
          EOF

      - name: "Phase 3: Verify assertions + cleanup"
        run: chainsaw test ${{ inputs.tests-path }}/ --test-file phase3-chainsaw-test

      # On assertion failure, dump the instance + child resource status. ACK surfaces the
      # real create error (an ARGOCD capability IdC-app collision, an sso: AccessDenied, an
      # RDS param-group issue, …) in .status.health.issues / .status.conditions — which the
      # kro pod logs do NOT show. Without this a failed real-infra run is undiagnosable
      # (the cluster is torn down before anyone can inspect it). Plain job step (not inside
      # the chainsaw heredoc) so shell vars like $k expand normally.
      - name: "Phase 3: Dump resource status on failure"
        if: failure()
        run: |
          echo "=== instance (${{ inputs.capability-name }}) ==="
          kubectl get ${{ inputs.capability-name }} -A -o yaml || true
          for k in capabilities.eks.services.k8s.aws clusters.eks.services.k8s.aws \
                   dbinstances.rds.services.k8s.aws roles.iam.services.k8s.aws \
                   policies.iam.services.k8s.aws securitygroups.ec2.services.k8s.aws \
                   dbparametergroups.rds.services.k8s.aws; do
            echo "=== $k ==="
            kubectl get "$k" -A -o yaml 2>/dev/null || true
          done

      - name: Force cleanup (safety net)
        if: always()
        run: |
          kubectl delete -f ${{ inputs.tests-path }}/instance.yaml 2>/dev/null || true
          sleep 30

  publish:
    needs: real-infra-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          # Narrow ECR-write role: only needs ecr push (chart publish). Falls back
          # to ECR_PUSH_ROLE for back-compat until a dedicated ECR-only role exists.
          role-to-assume: ${{ vars.ECR_PUBLISH_ROLE || vars.ECR_PUSH_ROLE }}
          aws-region: us-east-1
      - uses: azure/setup-helm@v4

      - name: Calculate version from PR label
        id: version
        run: |
          # NOTE: the `|| echo 0.0.0` must guard the WHOLE pipeline, not just `sed` — with
          # no tags, `git describe` fails but `sed` still exits 0, leaving LAST_TAG empty →
          # awk produces "..1" → "invalid semantic version" on the first-ever publish. Take
          # the tag first, then default when empty.
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null | sed 's/^v//')
          LAST_TAG=${LAST_TAG:-0.0.0}
          LABEL=$(gh pr list --state merged --limit 1 --json labels --jq '.[0].labels[].name' | grep "release/" | head -1 || echo "release/patch")
          case $LABEL in
            release/major) NEW_VERSION=$(echo $LAST_TAG | awk -F. '{print $1+1".0.0"}') ;;
            release/minor) NEW_VERSION=$(echo $LAST_TAG | awk -F. '{print $1"."$2+1".0"}') ;;
            *) NEW_VERSION=$(echo $LAST_TAG | awk -F. '{print $1"."$2"."$3+1}') ;;
          esac
          echo "VERSION=$NEW_VERSION" >> $GITHUB_ENV
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Publishing version: $NEW_VERSION (label: $LABEL, last tag: $LAST_TAG)"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Publish to ECR
        run: |
          VERSION=$(echo "$VERSION" | sed 's/^v//')
          aws ecr get-login-password | helm registry login --username AWS --password-stdin ${{ vars.ECR_REGISTRY }}
          helm package ${{ inputs.chart-path }} --version $VERSION
          CHART_NAME=$(yq '.name' ${{ inputs.chart-path }}/Chart.yaml)
          helm push ${CHART_NAME}-${VERSION}.tgz oci://${{ vars.ECR_REGISTRY }}/${{ vars.PROJECT }}/charts

      - name: Tag release
        run: |
          git tag v$VERSION
          git push --tags

  bump-staging:
    needs: publish
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: guilhermegreco
          repositories: platform-core

      - name: Get chart name from source repo
        id: chart-info
        uses: actions/checkout@v4
        with:
          path: source-repo

      - name: Read chart name
        id: chart-name
        run: |
          CHART_NAME=$(yq '.name' source-repo/${{ inputs.chart-path }}/Chart.yaml)
          echo "chart-name=$CHART_NAME" >> $GITHUB_OUTPUT
          echo "Chart name: $CHART_NAME"

      - uses: actions/checkout@v4
        with:
          repository: guilhermegreco/platform-core
          token: ${{ steps.app-token.outputs.token }}
          path: platform-core

      - name: Bump staging version
        run: |
          VERSION=$(echo "${{ needs.publish.outputs.version }}" | sed "s/^v//")
          CHART_NAME="${{ steps.chart-name.outputs.chart-name }}"
          echo "Bumping $CHART_NAME to $VERSION"
          cd platform-core
          yq -i "(.dependencies[] | select(.name == \"$CHART_NAME\")).version = \"$VERSION\"" argocd/staging/Chart.yaml
          cat argocd/staging/Chart.yaml

      # Production hardening — separation of duties on the staging bump.
      #
      # A GitHub App bot both OPENS and (by default) SQUASH-MERGES this PR into
      # platform-core `main`. That is a self-merge with no human review of what
      # lands in the release-captain's GitOps root. Two defenses are RECOMMENDED
      # and are complementary to the `auto-merge-staging-bump` input below:
      #   1. Branch protection on `main` requiring PR review + status checks, so
      #      even the bot's PR needs an approval before it can merge.
      #   2. CODEOWNERS (see /CODEOWNERS in this repo) making argocd/** and
      #      charts/** platform-team-owned, so the release captain reviews every
      #      capability version that reaches staging/production.
      # NOTE: if branch protection requires review, the bot self-merge below will
      # be BLOCKED — that is the intended end state. Until protection is enabled,
      # `auto-merge-staging-bump: true` (default) preserves today's behavior. Set
      # the input to `false` to open the PR and hand the merge to a human.
      - name: Create staging bump PR
        run: |
          VERSION=$(echo "${{ needs.publish.outputs.version }}" | sed "s/^v//")
          CHART_NAME="${{ steps.chart-name.outputs.chart-name }}"
          cd platform-core
          git config user.name "semver-bumper[bot]"
          git config user.email "semver-bumper[bot]@users.noreply.github.com"
          git checkout -b bump-staging-${CHART_NAME}-$VERSION
          git add argocd/staging/Chart.yaml
          git commit -m "chore(staging): bump $CHART_NAME to $VERSION"
          git push origin bump-staging-${CHART_NAME}-$VERSION
          gh pr create --title "chore(staging): bump $CHART_NAME to $VERSION" \
            --body "Auto-generated by capability pipeline after Tier 2 passed." \
            --base main
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Auto-merge staging bump PR
        if: inputs.auto-merge-staging-bump
        run: |
          cd platform-core
          # Bot self-merge. Left ON by default to keep the current operating
          # model non-breaking; a human-review gate is preferred (see comment
          # above + CODEOWNERS). If branch protection requires review this step
          # will fail intentionally — flip `auto-merge-staging-bump: false` in
          # the caller once a reviewer/auto-approval flow is in place.
          gh pr merge --squash --delete-branch
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
