name: Capability Pipeline
on:
  workflow_call:
    inputs:
      chart-path:
        required: true
        type: string
        default: chart
      tests-path:
        required: true
        type: string
        default: tests/tier2
      capability-name:
        required: true
        type: string
      ack-controllers:
        required: true
        type: string
        default: "rds"
      assert-timeout:
        required: false
        type: string
        default: "15m"
      delete-timeout:
        required: false
        type: string
        default: "5m"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - run: helm lint ${{ inputs.chart-path }}
      - run: helm template test ${{ inputs.chart-path }} > /dev/null

  tier1:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: Setup platform CI (fake)
        uses: guilhermegreco/platform-core/.github/actions/setup-platform-ci@main
        with:
          mode: fake
      - name: Deploy RGD
        run: |
          helm template test ${{ inputs.chart-path }} | kubectl apply -f -
          sleep 15
      - name: Verify RGD is Active
        run: |
          STATE=$(kubectl get rgd ${{ inputs.capability-name }}.kro.run -o jsonpath='{.status.state}')
          echo "RGD state: $STATE"
          if [ "$STATE" != "Active" ]; then
            kubectl describe rgd ${{ inputs.capability-name }}.kro.run
            exit 1
          fi
      - name: Collect debug info
        if: failure()
        run: |
          kubectl get rgd -A -o yaml
          kubectl logs -n kro-system -l app.kubernetes.io/name=kro --tail=100

  real-infra-test:
    needs: tier1
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.ECR_PUSH_ROLE }}
          aws-region: us-east-1

      - name: Setup platform CI (real)
        uses: guilhermegreco/platform-core/.github/actions/setup-platform-ci@main
        with:
          mode: real
          ack-controllers: ${{ inputs.ack-controllers }}

      - name: Validate test structure
        run: |
          if [ ! -f ${{ inputs.tests-path }}/instance.yaml ]; then
            echo "FAIL: Missing ${{ inputs.tests-path }}/instance.yaml"
            exit 1
          fi
          if [ -z "$(ls ${{ inputs.tests-path }}/assertions/*.yaml 2>/dev/null)" ]; then
            echo "FAIL: No assertion files in ${{ inputs.tests-path }}/assertions/"
            exit 1
          fi
          if [ ! -f ${{ inputs.tests-path }}/cleanup.yaml ]; then
            echo "FAIL: Missing ${{ inputs.tests-path }}/cleanup.yaml"
            exit 1
          fi

      - name: Deploy RGD (previous from ECR, or current if first time)
        run: |
          aws ecr get-login-password --region us-east-1 | \
            helm registry login --username AWS --password-stdin ${{ vars.ECR_REGISTRY }} 2>/dev/null || true

          if helm template prev oci://${{ vars.ECR_REGISTRY }}/${{ vars.PROJECT }}/charts/team-${{ inputs.capability-name }} 2>/dev/null | kubectl apply -f -; then
            echo "UPGRADE_MODE=true" >> $GITHUB_ENV
            echo "Previous RGD deployed (will test upgrade path)"
          else
            echo "UPGRADE_MODE=false" >> $GITHUB_ENV
            echo "No previous version in ECR (first deploy) — using current RGD"
            helm template test ${{ inputs.chart-path }} | kubectl apply -f -
          fi
          sleep 15

      - name: Generate Phase 1 Chainsaw test (create + wait)
        run: |
          cat > ${{ inputs.tests-path }}/phase1-chainsaw-test.yaml << EOF
          apiVersion: chainsaw.kyverno.io/v1alpha1
          kind: Test
          metadata:
            name: ${{ inputs.capability-name }}-provision
          spec:
            namespace: default
            timeouts:
              apply: 30s
              assert: ${{ inputs.assert-timeout }}
            steps:
              - name: create-instance
                try:
                  - apply:
                      file: instance.yaml
              - name: wait-for-available
                try:
                  - assert:
                      file: "assertions/available.yaml"
          EOF

      - name: "Phase 1: Provision + wait for available"
        run: chainsaw test ${{ inputs.tests-path }}/ --test-file phase1-chainsaw-test --namespace default --skip-delete

      - name: "Phase 2: Apply NEW RGD (upgrade)"
        if: env.UPGRADE_MODE == 'true'
        run: |
          echo "Upgrading RGD to current branch version..."
          helm template test ${{ inputs.chart-path }} | kubectl apply -f -
          echo "New RGD applied. kro will reconcile the existing instance..."
          sleep 15

      - name: "Phase 2: Verify instance not ERROR after upgrade"
        if: env.UPGRADE_MODE == 'true'
        run: |
          INSTANCE_NAME=$(kubectl get -f ${{ inputs.tests-path }}/instance.yaml -o jsonpath='{.metadata.name}')
          KIND=$(kubectl get -f ${{ inputs.tests-path }}/instance.yaml -o jsonpath='{.kind}')
          echo "Checking $KIND/$INSTANCE_NAME state..."
          for i in $(seq 1 10); do
            STATE=$(kubectl get -f ${{ inputs.tests-path }}/instance.yaml -o jsonpath='{.status.state}' 2>/dev/null || echo "UNKNOWN")
            echo "  Attempt $i/10: state=$STATE"
            if [ "$STATE" = "ERROR" ]; then
              echo "FAIL: Instance went ERROR after upgrade"
              kubectl describe -f ${{ inputs.tests-path }}/instance.yaml
              exit 1
            fi
            if [ "$STATE" = "ACTIVE" ]; then
              echo "PASS: Instance is ACTIVE after upgrade"
              break
            fi
            sleep 5
          done

      - name: Generate Phase 3 Chainsaw test (assertions + cleanup)
        run: |
          cat > ${{ inputs.tests-path }}/phase3-chainsaw-test.yaml << EOF
          apiVersion: chainsaw.kyverno.io/v1alpha1
          kind: Test
          metadata:
            name: ${{ inputs.capability-name }}-verify-and-cleanup
          spec:
            namespace: default
            timeouts:
              apply: 30s
              assert: ${{ inputs.assert-timeout }}
              error: 2m
              delete: ${{ inputs.delete-timeout }}
            steps:
              - name: verify-all-assertions
                try:
                  - assert:
                      file: "assertions/*.yaml"
                catch:
                  - podLogs:
                      selector: app.kubernetes.io/name=kro
                      namespace: kro-system
              - name: delete-instance
                try:
                  - delete:
                      file: cleanup.yaml
              - name: verify-cleanup
                try:
                  - error:
                      file: "assertions/available.yaml"
                catch:
                  - podLogs:
                      selector: app.kubernetes.io/name=kro
                      namespace: kro-system
          EOF

      - name: "Phase 3: Verify assertions + cleanup"
        run: chainsaw test ${{ inputs.tests-path }}/ --test-file phase3-chainsaw-test

      - name: Force cleanup (safety net)
        if: always()
        run: |
          kubectl delete -f ${{ inputs.tests-path }}/instance.yaml 2>/dev/null || true
          sleep 30

  publish:
    needs: real-infra-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.ECR_PUSH_ROLE }}
          aws-region: us-east-1
      - uses: azure/setup-helm@v4

      - name: Calculate version from PR label
        id: version
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null | sed 's/^v//' || echo "0.0.0")
          LABEL=$(gh pr list --state merged --limit 1 --json labels --jq '.[0].labels[].name' | grep "release/" | head -1 || echo "release/patch")
          case $LABEL in
            release/major) NEW_VERSION=$(echo $LAST_TAG | awk -F. '{print $1+1".0.0"}') ;;
            release/minor) NEW_VERSION=$(echo $LAST_TAG | awk -F. '{print $1"."$2+1".0"}') ;;
            *) NEW_VERSION=$(echo $LAST_TAG | awk -F. '{print $1"."$2"."$3+1}') ;;
          esac
          echo "VERSION=$NEW_VERSION" >> $GITHUB_ENV
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Publishing version: $NEW_VERSION (label: $LABEL, last tag: $LAST_TAG)"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Publish to ECR
        run: |
          aws ecr get-login-password | helm registry login --username AWS --password-stdin ${{ vars.ECR_REGISTRY }}
          helm package ${{ inputs.chart-path }} --version $VERSION
          helm push team-${{ inputs.capability-name }}-${VERSION}.tgz oci://${{ vars.ECR_REGISTRY }}/${{ vars.PROJECT }}/charts

      - name: Tag release
        run: |
          git tag v$VERSION
          git push --tags

  bump-staging:
    needs: publish
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: guilhermegreco
          repositories: platform-core

      - uses: actions/checkout@v4
        with:
          repository: guilhermegreco/platform-core
          token: ${{ steps.app-token.outputs.token }}

      - name: Bump staging version
        run: |
          VERSION=$(echo "${{ needs.publish.outputs.version }}" | sed "s/^v//")
          echo "Bumping team-${{ inputs.capability-name }} to $VERSION"
          yq -i '(.dependencies[] | select(.name == "team-${{ inputs.capability-name }}")).version = "'$VERSION'"' argocd/staging/Chart.yaml
          cat argocd/staging/Chart.yaml

      - name: Create and auto-merge PR
        run: |
          VERSION=$(echo "${{ needs.publish.outputs.version }}" | sed "s/^v//")
          git config user.name "semver-bumper[bot]"
          git config user.email "semver-bumper[bot]@users.noreply.github.com"
          git checkout -b bump-staging-${{ inputs.capability-name }}-$VERSION
          git add argocd/staging/Chart.yaml
          git commit -m "chore(staging): bump team-${{ inputs.capability-name }} to $VERSION"
          git push origin bump-staging-${{ inputs.capability-name }}-$VERSION
          gh pr create --title "chore(staging): bump team-${{ inputs.capability-name }} to $VERSION" \
            --body "Auto-generated by capability pipeline after Tier 2 passed." \
            --base main
          gh pr merge --squash --delete-branch
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
