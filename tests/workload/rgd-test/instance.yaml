apiVersion: kro.run/v1alpha1
kind: Workload
metadata:
  name: rgd-test
  namespace: platform-testing
spec:
  name: rgd-test
  namespace: platform-testing
  image: 279051970617.dkr.ecr.us-east-1.amazonaws.com/sample-app:latest
  port: 8080
  replicas: 1
  clusterName: plat-cp-cluster
  accountId: "279051970617"
  region: us-east-1
  database:
    enabled: true
    engine: postgres
    size: small
    highAvailability: false
  cache:
    enabled: false
    engine: redis
    size: small
  events:
    enabled: false
    pattern: fanout
    dlq: true
  env:
    - name: AWS_CONTAINER_AUTHORIZATION_TOKEN_FILE
      value: "/var/run/secrets/pods.eks.amazonaws.com/serviceaccount/eks-pod-identity-token"
    - name: AWS_CONTAINER_CREDENTIALS_FULL_URI
      value: "http://169.254.170.23/v1/credentials"
    - name: AWS_REGION
      value: "us-east-1"
    - name: DATABASE_HOST
      valueFrom:
        secretKeyRef:
          name: rgd-test-db-conn
          key: host
    - name: DATABASE_PORT
      valueFrom:
        secretKeyRef:
          name: rgd-test-db-conn
          key: port
    - name: DATABASE_SECRET_ARN
      valueFrom:
        secretKeyRef:
          name: rgd-test-db-conn
          key: secretArn
  policyDocument: |
    {
      "Version": "2012-10-17",
      "Statement": [
        {
          "Effect": "Allow",
          "Action": ["secretsmanager:GetSecretValue", "secretsmanager:DescribeSecret"],
          "Resource": "arn:aws:secretsmanager:us-east-1:279051970617:secret:rds!*"
        },
        {
          "Effect": "Allow",
          "Action": ["rds-db:connect"],
          "Resource": "arn:aws:rds-db:us-east-1:279051970617:dbuser:*/*"
        }
      ]
    }
