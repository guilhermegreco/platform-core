apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: workload.kro.run
spec:
  schema:
    apiVersion: v1alpha1
    kind: Workload
    spec:
      name: string
      namespace: string | default="default"
      image: string
      port: integer | default=8080
      replicas: integer | default=1
      clusterName: string
      accountId: string
      region: string | default="us-east-1"
      env: '[]object'
      policyDocument: string
      database:
        enabled: boolean | default=false
        engine: string | default="postgres"
        size: string | default="small"
        highAvailability: boolean | default=false
      cache:
        enabled: boolean | default=false
        engine: string | default="redis"
        size: string | default="small"
      events:
        enabled: boolean | default=false
        pattern: string | default="fanout"
        dlq: boolean | default=true
    status:
      ready: ${deployment.status.availableReplicas}
      podIdentityArn: ${podidentity.status.associationARN}

  resources:
    - id: serviceaccount
      template:
        apiVersion: v1
        kind: ServiceAccount
        metadata:
          name: ${schema.spec.name}-sa
          namespace: ${schema.spec.namespace}

    - id: role
      template:
        apiVersion: iam.services.k8s.aws/v1alpha1
        kind: Role
        metadata:
          name: ${schema.spec.name}-role
          namespace: ${schema.spec.namespace}
        spec:
          name: ${schema.spec.name}-role
          assumeRolePolicyDocument: |
            {
              "Version": "2012-10-17",
              "Statement": [{
                "Effect": "Allow",
                "Principal": { "Service": "pods.eks.amazonaws.com" },
                "Action": ["sts:AssumeRole", "sts:TagSession"]
              }]
            }
          policies:
            - ${policy.status.ackResourceMetadata.arn}

    - id: policy
      template:
        apiVersion: iam.services.k8s.aws/v1alpha1
        kind: Policy
        metadata:
          name: ${schema.spec.name}-workload-policy
          namespace: ${schema.spec.namespace}
        spec:
          name: ${schema.spec.name}-workload-policy
          policyDocument: ${schema.spec.policyDocument}

    - id: podidentity
      readyWhen:
        - ${podidentity.status.associationARN != ""}
      template:
        apiVersion: eks.services.k8s.aws/v1alpha1
        kind: PodIdentityAssociation
        metadata:
          name: ${schema.spec.name}-pod-identity
          namespace: ${schema.spec.namespace}
        spec:
          clusterName: ${schema.spec.clusterName}
          namespace: ${schema.spec.namespace}
          serviceAccount: ${schema.spec.name}-sa
          roleARN: arn:aws:iam::${schema.spec.accountId}:role/${schema.spec.name}-role

    - id: database
      includeWhen:
        - ${schema.spec.database.enabled == true}
      template:
        apiVersion: kro.run/v1alpha1
        kind: Database
        metadata:
          name: ${schema.spec.name}-db
          namespace: ${schema.spec.namespace}
        spec:
          name: ${schema.spec.name}
          namespace: ${schema.spec.namespace}
          engine: ${schema.spec.database.engine}
          size: ${schema.spec.database.size}
          highAvailability: ${schema.spec.database.highAvailability}

    - id: cache
      includeWhen:
        - ${schema.spec.cache.enabled == true}
      template:
        apiVersion: kro.run/v1alpha1
        kind: Cache
        metadata:
          name: ${schema.spec.name}-cache
          namespace: ${schema.spec.namespace}
        spec:
          name: ${schema.spec.name}
          namespace: ${schema.spec.namespace}
          engine: ${schema.spec.cache.engine}
          size: ${schema.spec.cache.size}

    - id: eventbus
      includeWhen:
        - ${schema.spec.events.enabled == true}
      template:
        apiVersion: kro.run/v1alpha1
        kind: EventBus
        metadata:
          name: ${schema.spec.name}-events
          namespace: ${schema.spec.namespace}
        spec:
          name: ${schema.spec.name}
          namespace: ${schema.spec.namespace}
          type: ${schema.spec.events.pattern}
          dlq: ${schema.spec.events.dlq}

    - id: deployment
      template:
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: ${schema.spec.name}
          namespace: ${schema.spec.namespace}
          annotations:
            platform.io/pod-identity-arn: ${podidentity.status.associationARN}
        spec:
          replicas: ${schema.spec.replicas}
          selector:
            matchLabels:
              app.kubernetes.io/name: ${schema.spec.name}
          template:
            metadata:
              labels:
                app.kubernetes.io/name: ${schema.spec.name}
            spec:
              serviceAccountName: ${schema.spec.name}-sa
              volumes:
                - name: eks-pod-identity-token
                  projected:
                    sources:
                      - serviceAccountToken:
                          audience: pods.eks.amazonaws.com
                          expirationSeconds: 86400
                          path: eks-pod-identity-token
              containers:
                - name: main
                  image: ${schema.spec.image}
                  ports:
                    - containerPort: ${schema.spec.port}
                  readinessProbe:
                    httpGet:
                      path: /ready
                      port: ${schema.spec.port}
                    initialDelaySeconds: 10
                    periodSeconds: 10
                    failureThreshold: 30
                  volumeMounts:
                    - name: eks-pod-identity-token
                      mountPath: /var/run/secrets/pods.eks.amazonaws.com/serviceaccount
                      readOnly: true
                  env: ${schema.spec.env}
