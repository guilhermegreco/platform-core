apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: workload-capability-lifecycle
spec:
  timeouts:
    assert: 15m
    error: 5m
    delete: 5m
  steps:
    # --- Deploy with database only ---
    - name: deploy-db-only
      try:
        - apply:
            resource:
              apiVersion: argoproj.io/v1alpha1
              kind: Application
              metadata:
                name: lifecycle-test
                namespace: argocd
              spec:
                project: default
                source:
                  repoURL: https://github.com/guilhermegreco/platform-core
                  path: charts/platform-app
                  targetRevision: HEAD
                  helm:
                    valuesObject:
                      name: lifecycle-test
                      team: platform-testing
                      namespace: platform-testing
                      image: 279051970617.dkr.ecr.us-east-1.amazonaws.com/sample-app:latest
                      port: 8080
                      replicas: 1
                      clusterName: plat-cp-cluster
                      accountId: "279051970617"
                      region: us-east-1
                      database:
                        enabled: true
                        class: default
                        size: small
                        engine: postgres
                        highAvailability: false
                      cache:
                        enabled: false
                        class: default
                        size: small
                        engine: redis
                      events:
                        enabled: false
                        class: default
                        pattern: fanout
                        dlq: true
                destination:
                  name: in-cluster
                  namespace: platform-testing
                syncPolicy:
                  automated:
                    prune: true
                    selfHeal: true
                  syncOptions:
                    - CreateNamespace=true
                    - RespectIgnoreDifferences=true

    - name: verify-app-synced
      try:
        - assert:
            resource:
              apiVersion: argoproj.io/v1alpha1
              kind: Application
              metadata:
                name: lifecycle-test
                namespace: argocd
              status:
                sync:
                  status: Synced
                health:
                  status: Healthy

    - name: verify-db-ready
      try:
        - assert:
            file: assertions/pod-ready.yaml
        - assert:
            file: assertions/db-secret.yaml

    # --- Add cache ---
    - name: add-cache
      try:
        - apply:
            resource:
              apiVersion: argoproj.io/v1alpha1
              kind: Application
              metadata:
                name: lifecycle-test
                namespace: argocd
              spec:
                project: default
                source:
                  repoURL: https://github.com/guilhermegreco/platform-core
                  path: charts/platform-app
                  targetRevision: HEAD
                  helm:
                    valuesObject:
                      name: lifecycle-test
                      team: platform-testing
                      namespace: platform-testing
                      image: 279051970617.dkr.ecr.us-east-1.amazonaws.com/sample-app:latest
                      port: 8080
                      replicas: 1
                      clusterName: plat-cp-cluster
                      accountId: "279051970617"
                      region: us-east-1
                      database:
                        enabled: true
                        class: default
                        size: small
                        engine: postgres
                        highAvailability: false
                      cache:
                        enabled: true
                        class: default
                        size: small
                        engine: redis
                      events:
                        enabled: false
                        class: default
                        pattern: fanout
                        dlq: true
                destination:
                  name: in-cluster
                  namespace: platform-testing
                syncPolicy:
                  automated:
                    prune: true
                    selfHeal: true
                  syncOptions:
                    - CreateNamespace=true
                    - RespectIgnoreDifferences=true

    - name: verify-db-and-cache-ready
      try:
        - assert:
            file: assertions/pod-ready.yaml
        - assert:
            file: assertions/db-secret.yaml
        - assert:
            file: assertions/cache-secret.yaml

    # --- Remove database ---
    - name: remove-database
      try:
        - apply:
            resource:
              apiVersion: argoproj.io/v1alpha1
              kind: Application
              metadata:
                name: lifecycle-test
                namespace: argocd
              spec:
                project: default
                source:
                  repoURL: https://github.com/guilhermegreco/platform-core
                  path: charts/platform-app
                  targetRevision: HEAD
                  helm:
                    valuesObject:
                      name: lifecycle-test
                      team: platform-testing
                      namespace: platform-testing
                      image: 279051970617.dkr.ecr.us-east-1.amazonaws.com/sample-app:latest
                      port: 8080
                      replicas: 1
                      clusterName: plat-cp-cluster
                      accountId: "279051970617"
                      region: us-east-1
                      database:
                        enabled: false
                        class: default
                        size: small
                        engine: postgres
                        highAvailability: false
                      cache:
                        enabled: true
                        class: default
                        size: small
                        engine: redis
                      events:
                        enabled: false
                        class: default
                        pattern: fanout
                        dlq: true
                destination:
                  name: in-cluster
                  namespace: platform-testing
                syncPolicy:
                  automated:
                    prune: true
                    selfHeal: true
                  syncOptions:
                    - CreateNamespace=true
                    - RespectIgnoreDifferences=true

    - name: verify-db-removed-cache-works
      try:
        - assert:
            file: assertions/pod-ready.yaml
        - assert:
            file: assertions/cache-secret.yaml
        - error:
            file: assertions/db-secret.yaml

    # --- Cleanup ---
    - name: cleanup
      try:
        - delete:
            ref:
              apiVersion: argoproj.io/v1alpha1
              kind: Application
              name: lifecycle-test
              namespace: argocd
        - error:
            file: assertions/pod-ready.yaml
